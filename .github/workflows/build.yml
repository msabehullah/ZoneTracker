name: Build ZoneTracker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use whatever Xcode is available on the runner
          ls /Applications/ | grep Xcode
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | head -1)/Contents/Developer"
          xcodebuild -version

      - name: Install iOS Simulator
        run: |
          # List available runtimes, install iOS if missing
          xcodebuild -downloadPlatform iOS

      - name: Install watchOS Simulator
        run: |
          xcodebuild -downloadPlatform watchOS

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Build iOS app
        run: |
          # Pick first available iPhone simulator
          DEST=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['name']); sys.exit()
          print('iPhone 16')
          ")
          echo "Building for simulator: $DEST"
          xcodebuild build \
            -project ZoneTracker.xcodeproj \
            -scheme ZoneTracker \
            -destination "platform=iOS Simulator,name=$DEST" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Watch app
        run: |
          DEST=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'watchOS' in runtime:
                  for d in devices:
                      if 'Watch' in d['name'] and d['isAvailable']:
                          print(d['name']); sys.exit()
          print('Apple Watch Series 10 (46mm)')
          ")
          echo "Building for simulator: $DEST"
          xcodebuild build \
            -project ZoneTracker.xcodeproj \
            -scheme ZoneTrackerWatch \
            -destination "platform=watchOS Simulator,name=$DEST" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO
