name: Build ZoneTracker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode and show info
        run: |
          # Use the default Xcode on the runner (don't force a version)
          xcodebuild -version
          xcrun simctl list runtimes
          echo "---"
          xcrun simctl list devices available | grep -E "iPhone|Watch" | head -10

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS app
        run: |
          # Find first available iPhone
          DEST=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in sorted(data['devices'].items(), reverse=True):
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['name']); sys.exit()
          " 2>/dev/null || echo "")
          if [ -z "$DEST" ]; then
            echo "No iPhone simulator found, building for generic iOS device"
            xcodebuild build \
              -project ZoneTracker.xcodeproj \
              -scheme ZoneTracker \
              -destination 'generic/platform=iOS' \
              -skipPackagePluginValidation \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "Building for simulator: $DEST"
            xcodebuild build \
              -project ZoneTracker.xcodeproj \
              -scheme ZoneTracker \
              -destination "platform=iOS Simulator,name=$DEST" \
              -skipPackagePluginValidation \
              CODE_SIGNING_ALLOWED=NO
          fi

      - name: Build Watch app
        run: |
          DEST=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in sorted(data['devices'].items(), reverse=True):
              if 'watchOS' in runtime:
                  for d in devices:
                      if 'Watch' in d['name'] and d['isAvailable']:
                          print(d['name']); sys.exit()
          " 2>/dev/null || echo "")
          if [ -z "$DEST" ]; then
            echo "No Watch simulator found, building for generic watchOS device"
            xcodebuild build \
              -project ZoneTracker.xcodeproj \
              -scheme ZoneTrackerWatch \
              -destination 'generic/platform=watchOS' \
              -skipPackagePluginValidation \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "Building for simulator: $DEST"
            xcodebuild build \
              -project ZoneTracker.xcodeproj \
              -scheme ZoneTrackerWatch \
              -destination "platform=watchOS Simulator,name=$DEST" \
              -skipPackagePluginValidation \
              CODE_SIGNING_ALLOWED=NO
          fi
